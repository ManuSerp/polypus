version: '3.8'

services:
  web:
    image: nginx:latest
    container_name: my-web-server
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - NODE_ENV=production
      - API_KEY=secret123
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - database
    restart: always
    networks:
      - frontend

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://user:pass@database:5432/mydb
      REDIS_URL: redis://cache:6379
      PORT: "3000"
    volumes:
      - ./api:/app
      - /app/node_modules
    depends_on:
      - database
      - cache
    command: npm run dev
    restart: unless-stopped
    networks:
      - frontend
      - backend

  database:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - backend

  cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - cache-data:/data
    restart: always
    networks:
      - backend

  worker:
    build: ./worker
    container_name: background-worker
    environment:
      - QUEUE_URL=redis://cache:6379
      - DATABASE_URL=postgresql://user:pass@database:5432/mydb
    depends_on:
      - cache
      - database
    restart: always
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  db-data:
  cache-data:
